# Plixar Shaders - shaders.properties
# Controls Iris/OptiFine pipeline options and the in-game settings GUI.

# --- Buffer formats ---
# colortex0 (scene color) and colortex3 (bloom) need HDR float storage since
# lighting / bloom hold values > 1.0. Declared here (NOT in GLSL) because the
# RGBA16F-style tokens are not valid GLSL identifiers.
# colortex2 holds only 0..1 lightmap/roughness/flag values, so RGBA8 is plenty
# and halves its bandwidth -- a real win on integrated GPUs (shared RAM).
# colortex3 (bloom) is RGB16F -- no alpha needed.
bufferFormat.colortex0=RGBA16F
bufferFormat.colortex1=RGBA16
bufferFormat.colortex2=RGBA8
bufferFormat.colortex3=RGB16F

# Render bloom at half resolution: ~4x fewer pixels for a near-identical look.
# composite1 writes colortex3, final reads it -- both honour this scale.
size.buffer.colortex3=0.5 0.5

# --- Shadows ---
# Resolution / distance are declared as const ints in lib/common.glsl so the
# in-game sliders can drive them; we only keep the render multiplier here.
# Shorter shadow distance = smaller area to render into the shadow map = faster.
shadowDistanceRenderMul=1.0

# --- Clouds: our procedural sky handles atmosphere; keep vanilla clouds fast ---
clouds=fast

# --- Screen settings GUI layout ---
screen=<profile> [LIGHTING] [WATER] [ATMOSPHERE] [POST] [SHADOWS]

# Profiles toggle bundles of options. A leading '!' disables a define.
# ULTRA_LOW: no shadows/fog/post -- just lit world + sky. Absolute max FPS.
# LOW_END  : fog + hard 512 shadows.
# FAST     : THE iGPU SWEET SPOT (default) -- soft shadows + fog + tonemap,
#            but no bloom/godrays/reflections. Aims for ~100 FPS on integrated
#            graphics while still looking like a proper lighting shader. The
#            shadow distance early-out keeps most pixels at a single tap.
# POTATO   : like FAST but hard shadows, for weaker dedicated GPUs.
# BALANCED : adds bloom, god rays, water reflections.
# ULTRA    : everything cranked, for strong GPUs.
profile.ULTRA_LOW=!SHADOWS_ENABLED !GODRAYS_ENABLED !BLOOM_ENABLED !FOG_ENABLED \
               !WATER_REFLECTIONS !WATER_WAVES !WATER_REFRACTION !VIGNETTE \
               !TONEMAP_ENABLED !AO_ENABLED GODRAYS_SAMPLES=8 SHADOW_RES=512 PCF_SAMPLES=1

profile.LOW_END=!SHADOWS_ENABLED !GODRAYS_ENABLED !BLOOM_ENABLED !WATER_REFLECTIONS \
               !WATER_WAVES !WATER_REFRACTION !VIGNETTE !TONEMAP_ENABLED !AO_ENABLED \
               FOG_ENABLED GODRAYS_SAMPLES=8 SHADOW_RES=512 PCF_SAMPLES=1

profile.FAST=SHADOWS_ENABLED FOG_ENABLED TONEMAP_ENABLED AO_ENABLED \
               !GODRAYS_ENABLED !BLOOM_ENABLED !WATER_REFLECTIONS !WATER_WAVES \
               !WATER_REFRACTION !VIGNETTE GODRAYS_SAMPLES=8 SHADOW_RES=1024 \
               PCF_SAMPLES=4 SHADOW_SOFTNESS=1.0

profile.POTATO=!GODRAYS_ENABLED !BLOOM_ENABLED !WATER_REFLECTIONS !WATER_WAVES \
               !VIGNETTE GODRAYS_SAMPLES=8 SHADOW_RES=1024 PCF_SAMPLES=1

profile.BALANCED=SHADOWS_ENABLED GODRAYS_ENABLED BLOOM_ENABLED WATER_REFLECTIONS \
               WATER_WAVES AO_ENABLED GODRAYS_SAMPLES=10 SHADOW_RES=1024 PCF_SAMPLES=5

profile.ULTRA=SHADOWS_ENABLED GODRAYS_ENABLED BLOOM_ENABLED WATER_REFLECTIONS \
               WATER_WAVES WATER_REFRACTION AO_ENABLED GODRAYS_SAMPLES=32 \
               SHADOW_RES=2048 PCF_SAMPLES=12 SHADOW_SOFTNESS=2.0 BLOOM_STRENGTH=0.60

# Default to FAST: great lighting + soft shadows, tuned for ~100 FPS on an
# integrated GPU (AMD Radeon Graphics). Turn VSYNC OFF in Video Settings or
# you'll be capped at your monitor's refresh rate (usually 60).
profile=FAST

screen.LIGHTING=SHADOWS_ENABLED SHADOW_SOFTNESS SUN_INTENSITY AMBIENT_STRENGTH AO_ENABLED
screen.WATER=WATER_WAVES WATER_REFLECTIONS WATER_REFRACTION WATER_OPACITY
screen.ATMOSPHERE=FOG_ENABLED FOG_DENSITY GODRAYS_ENABLED GODRAYS_SAMPLES SKY_INTENSITY
screen.POST=BLOOM_ENABLED BLOOM_STRENGTH TONEMAP_ENABLED EXPOSURE SATURATION VIGNETTE
screen.SHADOWS=SHADOW_RES PCF_SAMPLES SHADOW_SOFTNESS SHADOW_BIAS

# --- Sliders ---
sliders=SHADOW_RES PCF_SAMPLES SHADOW_SOFTNESS SUN_INTENSITY AMBIENT_STRENGTH \
        WATER_OPACITY FOG_DENSITY GODRAYS_SAMPLES SKY_INTENSITY BLOOM_STRENGTH \
        EXPOSURE SATURATION SHADOW_BIAS

# Default values are defined in common.glsl via #ifndef guards.
